name: Deploy Yongsan Frontend

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "**/*.md"
  workflow_dispatch:

jobs:
  test:
    name: Unit + E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  deploy:
    name: Build & Deploy (home server)
    needs: test
    runs-on: [self-hosted, home]
    steps:
      - name: Sync source on home server
        run: |
          cd /home/jj/apps/yongsan-site-exercise
          git fetch origin main
          git reset --hard origin/main

      - name: Rebuild & restart frontend
        run: |
          cd /home/jj/apps/stack
          docker compose --env-file .env build yongsan-frontend
          docker compose --env-file .env up -d --no-deps yongsan-frontend

      - name: Health check
        run: |
          sleep 3
          curl -fsS -o /dev/null http://127.0.0.1:8081/
