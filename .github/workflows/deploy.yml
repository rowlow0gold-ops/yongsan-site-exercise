name: Deploy Frontend
on:
  push:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  build-test:
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/rowlow0gold-ops/yongsan-frontend:test
          build-args: |
            VITE_API_BASE_URL=https://test.minhojan-world.site
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_WEATHER_API_KEY=${{ secrets.VITE_WEATHER_API_KEY }}

  build-prod:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/rowlow0gold-ops/yongsan-frontend:latest
          build-args: |
            VITE_API_BASE_URL=https://minhojan-world.site
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_WEATHER_API_KEY=${{ secrets.VITE_WEATHER_API_KEY }}

  deploy-test:
    needs: build-test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Deploy to test server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u rowlow0gold-ops --password-stdin
            docker pull ghcr.io/rowlow0gold-ops/yongsan-frontend:test
            cd ~
            docker compose up --detach

  deploy-prod:
    needs: build-prod
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to prod server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u rowlow0gold-ops --password-stdin
            docker pull ghcr.io/rowlow0gold-ops/yongsan-frontend:latest
            cd ~
            docker compose up --detach
